name: Build Debug APK (Simplified)

on:
  workflow_dispatch:

jobs:
  build:
    name: Build Debug APK
    runs-on: ubuntu-latest
    env:
      ACTIONS_ALLOW_USE_UNSECURE_NODE_VERSION: true

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '18'
        cache: 'npm'

    - name: Install dependencies
      run: |
        echo "Installing npm dependencies..."
        npm install
        echo "Dependencies installed successfully"

    - name: Setup JDK
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'

    - name: Grant execute permission for gradlew
      run: |
        chmod +x android/gradlew

    - name: Download Gradle Wrapper
      run: |
        cd android
        if [ ! -f "gradle/wrapper/gradle-wrapper.jar" ]; then
          echo "Downloading Gradle wrapper..."
          curl -L https://services.gradle.org/distributions/gradle-8.0-bin.zip -o /tmp/gradle.zip
          unzip /tmp/gradle.zip -d /tmp/gradle
          cp /tmp/gradle/gradle-8.0/lib/gradle-wrapper-8.0.jar gradle/wrapper/gradle-wrapper.jar
        fi

    - name: Build Debug APK
      run: |
        cd android
        ./gradlew assembleDebug --stacktrace
      env:
        CI: false

    - name: Upload Debug APK
      uses: actions/upload-artifact@v4
      with:
        name: app-debug.apk
        path: android/app/build/outputs/apk/debug/app-debug.apk
        retention-days: 30
